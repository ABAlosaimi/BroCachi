syntax = "proto3";

option go_package = "github.com/ABAlosaimi/BroCachi/common/cacheReader";

// this cache reader will read the chace data of the browsers configured
service CacheReader { 
   //
  rpc Read(BrowserCacheReadRequest) returns (BrowserCacheReadResponse) {};
}

message BrowserCacheReadRequest {
    string browserName = 1; 
    string cachePath = 2;
}

message BrowserCacheReadResponse {
  int64 cacheSize = 1;
  int64 cacheEntries = 2;
}