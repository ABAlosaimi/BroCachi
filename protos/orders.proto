syntax = "proto3";

option go_package = "github.com/ABAlosaimi/BroCachi/common/protoGen";

// this cache reader will read the chace data of the browsers configured
service OrderService { 
  //
 rpc CreateOrder (CreateOrderRequest) returns (CreateOrderResponse);
}

message CreateOrderRequest {
    string order_id = 1;
    string product_id = 2;
    int32 quantity = 3;
}

message CreateOrderResponse {
    string message = 1;
}
